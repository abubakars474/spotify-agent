<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #1DB954;

      --bg: #FAF9F6;
      --surface: #F4F1EA;
      --surface-2: #FFFFFF;

      --border: #E6E0D6;

      --text: #1F1F1F;
      --muted: #6F6A63;

      --red: #D94C57;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      width: 600px;
      height: 520px;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29,185,84,.08) 0%, transparent 70%);
      top: -60px; right: -40px;
      pointer-events: none;
      transition: background .6s ease;
    }
    body.running::after { background: radial-gradient(circle, rgba(29,185,84,.18) 0%, transparent 70%); }

    .container {
      position: relative; height: 100%;
      display: flex; flex-direction: column;
      padding: 16px 20px;
    }

    .top { display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 22px; height: 22px; background: var(--green);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 12px; height: 12px; }
    .logo-text {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .logo-text span { color: var(--green); }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px;
      font-size: 10px; letter-spacing: .06em; color: var(--muted);
      transition: all .4s ease;
    }
    .status-pill.active { border-color: rgba(29,185,84,.3); color: var(--green); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: .4s; }
    .status-pill.active .dot {
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    .visualizer {
      display: flex; align-items: center; justify-content: center; gap: 3px;
      height: 42px; margin-top: 28px;
    }
    .bar {
      width: 3px; background: var(--border); border-radius: 2px; height: 6px;
      transition: background .4s ease;
    }
    .running .bar {
      background: var(--green);
      animation: wave var(--dur) ease-in-out infinite alternate;
    }
    @keyframes wave {
      from { height: 4px; opacity: .5; }
      to   { height: var(--h); opacity: 1; }
    }

    .now-playing {
      text-align: center; min-height: 40px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin-top: 6px;
    }
    .np-label {
      font-size: 9px; color: var(--muted);
      letter-spacing: .15em; text-transform: uppercase;
    }
    .np-title {
      font-size: 13px; color: var(--text); margin-top: 4px;
      max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .np-title.active { color: var(--green); }

    .divider { width: 100%; height: 1px; background: var(--border); margin: 16px 0; }

    .view { -webkit-app-region: no-drag; }
    .view.hidden { display: none; }

    .input_group { margin-bottom: 10px; }
    .input_group label {
      font-size: 12px; color: var(--muted); opacity: 0.8;
      letter-spacing: .1em; text-transform: uppercase;
    }
    .input_group input {
      width: 100%; height: 38px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 0 12px; border-radius: 6px; outline: none;
      margin-top: 4px;
      font-family: 'DM Mono', monospace; font-size: 12px;
    }
    .input_group input:focus { border-color: rgba(29,185,84,.4); }

    .controls { display: flex; gap: 10px; -webkit-app-region: no-drag; margin-top: 20px; }
    .btn {
      flex: 1; height: 38px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      transition: all .2s ease;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn:hover {
      color: var(--text);
      border-color: #CFC7BB;
      background: #ECE7DE;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .btn-primary { border-color: rgba(29,185,84,.25); color: var(--green); }
    .btn-primary:hover {
      background: rgba(29,185,84,.08);
      border-color: rgba(29,185,84,.5);
      box-shadow: 0 0 16px rgba(29,185,84,.1);
    }
    .btn-danger { border-color: rgba(232,68,77,.2); color: var(--red); }
    .btn-danger:hover { background: rgba(232,68,77,.08); border-color: rgba(232,68,77,.4); }
    .btn-reset {
      border-color: #DDD6CA;
      color: #8B847A;
    }
    .btn-reset:hover {
      background: #ECE7DE;
      border-color: #CFC7BB;
      color: var(--text);
    }
    .error {
      font-size: 10px; color: var(--red);
      margin-top: 8px; min-height: 14px;
      letter-spacing: .05em;
    }

    .hint {
      font-size: 13px; color: var(--muted); opacity: 0.8;
      margin-bottom: 20px; text-align: center;
      letter-spacing: .05em; line-height: 1.5;
    }
    .hint b { color: var(--green); font-weight: 500; }
  </style>
</head>
<body>

  <div class="container">

    <div class="top">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5" stroke="white" stroke-width="1.2"/>
            <path d="M3 4.5C4.5 4 7.5 4 9 4.8M3 6C4.3 5.6 7 5.6 9 6.2M3.5 7.5C4.8 7.2 7.2 7.2 8.5 7.7"
                  stroke="white" stroke-width="1" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">Myspotify <span>Agent</span></span>
      </div>

      <div class="status-pill" id="statusPill">
        <div class="dot"></div>
        <span id="statusText">IDLE</span>
      </div>
    </div>

    <div class="visualizer" id="visualizer"></div>

    <div class="now-playing">
      <span class="np-label">Now Playing</span>
      <span class="np-title" id="npTitle">— idle —</span>
    </div>

    <div class="divider"></div>

    <!-- ============================================ -->
    <!-- VIEW 1: Initial — Open Browser -->
    <!-- ============================================ -->
    <div id="viewInitial" class="view">
      <div class="hint">Click <b>Open Browser</b>, sign into Spotify in the window that opens, then come back here to log in.</div>
      <div class="controls">
        <button class="btn btn-primary" onclick="openBrowser()">Open Browser</button>
      </div>
    </div>

    <!-- ============================================ -->
    <!-- VIEW 2: Login Form -->
    <!-- ============================================ -->
    <div id="viewLogin" class="view hidden">
      <div class="input_group">
        <label>Myspotify Email Address</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="off">
      </div>
      <div class="input_group">
        <label>Myspotify Password</label>
        <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="off">
      </div>
      <div class="error" id="loginError"></div>
      <div class="controls">
        <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">Login</button>
        <button class="btn btn-reset" onclick="resetApp()">Reset</button>
      </div>
    </div>

    <!-- ============================================ -->
    <!-- VIEW 3: Playback Controls -->
    <!-- ============================================ -->
    <div id="viewControls" class="view hidden">
      <div class="input_group">
        <label>Playlist duration (minutes)</label>
        <input id="duration" type="number" min="1" value="30">
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="btnStart" onclick="start()">Start</button>
        <button class="btn btn-danger"  id="btnStop"  onclick="stop()" disabled>Stop</button>
         <!-- <button class="btn btn-danger"  id="btnStop"  onclick="pause()" disabled>Pause</button> -->
        <button class="btn btn-reset"   onclick="resetApp()">Reset</button>
      </div>
    </div>

  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const statusPill = document.getElementById('statusPill');
    const statusText = document.getElementById('statusText');
    const npTitle    = document.getElementById('npTitle');
    const loginError = document.getElementById('loginError');
    const btnLogin   = document.getElementById('btnLogin');
    const btnStart   = document.getElementById('btnStart');
    const btnStop    = document.getElementById('btnStop');
    const viz        = document.getElementById('visualizer');

    // Waveform bars
    const heights = [6,8,14,20,28,34,38,34,28,22,16,24,30,36,30,22,18,26,34,38,32,24,16,22,30,36,28,20,14,10,8,6];
    for (let i = 0; i < heights.length; i++) {
      const b = document.createElement('div');
      b.className = 'bar';
      b.style.setProperty('--h', heights[i] + 'px');
      b.style.setProperty('--dur', (0.6 + Math.random() * 0.8).toFixed(2) + 's');
      b.style.animationDelay = (i * 0.03).toFixed(2) + 's';
      viz.appendChild(b);
    }

    // ---- View management ----
    function showView(name) {
      ['viewInitial', 'viewLogin', 'viewControls'].forEach(id =>
        document.getElementById(id).classList.toggle('hidden', id !== name));
    }

    function setStatus(state, label) {
      statusText.textContent = label;
      if (state === 'running') {
        document.body.classList.add('running');
        statusPill.classList.add('active');
      } else {
        document.body.classList.remove('running');
        statusPill.classList.remove('active');
      }
    }

    function setNowPlaying(title) {
      if (title) {
        npTitle.textContent = title;
        npTitle.classList.add('active');
      } else {
        npTitle.textContent = '— idle —';
        npTitle.classList.remove('active');
      }
    }

    // ---- Actions ----
    function openBrowser() {
      ipcRenderer.send('open-browser', 'chrome');
      setStatus('idle', 'BROWSER OPEN');
      showView('viewLogin');
    }

    async function doLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      loginError.textContent = '';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        loginError.textContent = 'Enter a valid email';
        return;
      }
      if (!password) {
        loginError.textContent = 'Password required';
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Signing in…';

      try {
        const result = await ipcRenderer.invoke('login', { email, password });
        if (result.success) {
          showView('viewControls');
          setStatus('idle', 'READY');
        } else {
          loginError.textContent = result.message || 'Login failed';
        }
      } catch (e) {
        loginError.textContent = 'Network error: ' + e.message;
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Login';
      }
    }

    function start() {
      const duration = Number(document.getElementById('duration').value);
      if (!duration || duration <= 0) {
        alert('Enter a valid duration');
        return;
      }
      ipcRenderer.send('start', { duration });
      setStatus('running', 'RUNNING');
      btnStart.disabled = true;
      btnStop.disabled  = false;
    }

    function stop() {
      ipcRenderer.send('stop');
      setStatus('idle', 'STOPPED');
      setNowPlaying(null);
      btnStart.disabled = false;
      btnStop.disabled  = true;
    }

    function pause() {
      ipcRenderer.send('pause');
      setStatus('paused', 'PAUSED');
      btnStart.disabled = false;
      btnStop.disabled  = true;
    }

    function resetApp() {
      ipcRenderer.send('reset');
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('duration').value = 30;
      loginError.textContent = '';
      btnStart.disabled = false;
      btnStop.disabled  = true;
      setStatus('idle', 'IDLE');
      setNowPlaying(null);
      showView('viewInitial');
    }

    // ---- Live updates from worker ----
    ipcRenderer.on('playlist-update', (e, data) => {
      setNowPlaying(data.title || data.url || 'Untitled playlist');
    });

    ipcRenderer.on('playback-state', (e, data) => {
      if (data.state === 'finished-all') {
        setStatus('idle', 'DONE');
        setNowPlaying(null);
        btnStart.disabled = false;
        btnStop.disabled  = true;
      }
    });
  </script>

  <div id="loginModal" class="modal hidden">

    <div class="modal-box">

      <h2>Spotify Login Required</h2>

      <p>
        Please login to your Spotify account
        in the opened browser window.
        <br><br>
        Audio playback will not work without login.
      </p>

      <button onclick="closeLoginModal()">
        OK
      </button>

    </div>

  </div>

</body>
</html>
