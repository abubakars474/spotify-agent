<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #1DB954;
      --green-dim: #15a046;
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface-2: #fafafa;
      --border: #e4e4e0;
      --border-strong: #cfcfca;
      --text: #1a1a1a;
      --text-soft: #444;
      --muted: #000000;
      --red: #d63a3a;
      --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      width: 600px;
      height: 520px;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29,185,84,.12) 0%, transparent 70%);
      top: -80px; right: -50px;
      pointer-events: none;
      transition: background .6s ease;
    }
    body.running::after { background: radial-gradient(circle, rgba(29,185,84,.22) 0%, transparent 70%); }

    .container {
      position: relative; height: 100%;
      display: flex; flex-direction: column;
      padding: 18px 22px;
    }

    .top { display: flex; align-items: center; justify-content: space-between; }

    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-icon {
      width: 24px; height: 24px; background: var(--green);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(29,185,84,.25);
    }
    .logo-icon svg { width: 13px; height: 13px; }
    .logo-text {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
      letter-spacing: .08em; text-transform: uppercase; color: var(--text);
    }
    .logo-text span { color: var(--green); }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 11px;
      font-size: 10px; letter-spacing: .08em; color: var(--muted);
      box-shadow: var(--shadow);
      transition: all .4s ease;
    }
    .status-pill.active { border-color: rgba(29,185,84,.4); color: var(--green-dim); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: .4s; }
    .status-pill.active .dot {
      background: var(--green);
      box-shadow: 0 0 6px rgba(29,185,84,.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    .visualizer {
      display: flex; align-items: center; justify-content: center; gap: 3px;
      height: 44px; margin-top: 26px;
    }
    .bar {
      width: 3px; background: var(--border-strong); border-radius: 2px; height: 6px;
      transition: background .4s ease;
    }
    .running .bar {
      background: var(--green);
      animation: wave var(--dur) ease-in-out infinite alternate;
    }
    .paused .bar {
      background: var(--green);
      opacity: .4;
      animation: none;
    }
    @keyframes wave {
      from { height: 4px; opacity: .5; }
      to   { height: var(--h); opacity: 1; }
    }

    .now-playing {
      text-align: center; min-height: 42px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin-top: 6px;
    }
    .np-label {
      font-size: 12px; color: var(--muted);
      letter-spacing: .18em; text-transform: uppercase;
    }
    .np-title {
      font-size: 13px; color: var(--text); margin-top: 4px;
      max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 500;
    }
    .np-title.active { color: var(--green-dim); }

    .divider { width: 100%; height: 1px; background: var(--border); margin: 18px 0; }

    .view { -webkit-app-region: no-drag; }
    .view.hidden { display: none; }

    .input_group { margin-bottom: 12px; }
    .input_group label {
      font-size: 12px; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase;
    }
    .input_group input {
      width: 100%; height: 40px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 0 13px; border-radius: 8px; outline: none;
      margin-top: 5px;
      font-family: 'DM Mono', monospace; font-size: 12px;
      box-shadow: var(--shadow);
      transition: border-color .2s, box-shadow .2s;
    }
    .input_group input::placeholder { color: var(--muted); opacity: 0.6; }
    .input_group input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(29,185,84,.12);
    }

    .controls { display: flex; gap: 10px; -webkit-app-region: no-drag; }

    .btn {
      flex: 1; height: 40px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--text-soft);
      font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      transition: all .2s ease;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      box-shadow: var(--shadow);
    }
    .btn:hover {
      color: var(--text); border-color: var(--border-strong);
      background: var(--surface-2);
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled {
      opacity: .4; cursor: not-allowed; transform: none;
      background: var(--surface);
    }

    .btn-primary { border-color: rgba(29,185,84,.4); color: var(--green-dim); background: var(--surface); }
    .btn-primary:hover {
      background: rgba(29,185,84,.06);
      border-color: var(--green);
      color: var(--green-dim);
      box-shadow: 0 2px 8px rgba(29,185,84,.15);
    }

    .btn-pause { border-color: rgba(80, 80, 80, 0.25); color: var(--text-soft); }
    .btn-pause:hover {
      background: rgba(0,0,0,.03); border-color: var(--text-soft); color: var(--text);
    }

    .btn-danger { border-color: rgba(214,58,58,.35); color: var(--red); }
    .btn-danger:hover {
      background: rgba(214,58,58,.06);
      border-color: var(--red);
    }

    .btn-reset { border-color: var(--border); color: var(--muted); }
    .btn-reset:hover {
      background: rgba(0,0,0,.02); border-color: var(--border-strong); color: var(--text-soft);
    }

    .error {
      font-size: 12px; color: var(--red);
      margin-top: 8px; min-height: 14px;
      letter-spacing: .04em;
    }

    .hint {
      font-size: 12px; color: var(--muted);
      margin-bottom: 12px; text-align: center;
      letter-spacing: .04em; line-height: 1.6;
    }
    .hint b { color: var(--green-dim); font-weight: 600; }

    .interrupt-bar {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 500;
      color: #92400e;
      background: rgba(251, 191, 36, 0.12);
      border: 1.5px solid rgba(251, 191, 36, 0.5);
      border-radius: 8px;
      padding: 12px 16px;
      letter-spacing: .02em;
      line-height: 1.6;
      text-align: center;
    }
    .interrupt-bar.error {
      font-size: 16px;
      font-weight: 600;
      color: #991b1b;
      background: rgba(220, 38, 38, 0.08);
      border: 2px solid rgba(220, 38, 38, 0.5);
    }
    .interrupt-bar.hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">

    <div class="top">
      <div class="logo">
        <div class="logo-icon">
          <img src="images/logo.svg" style="width: 40px; height: auto; margin-right: 8px;" />
        </div>
        <span class="logo-text">Myspotify <span>Agent</span></span>
      </div>

      <div class="status-pill" id="statusPill">
        <div class="dot"></div>
        <span id="statusText">IDLE</span>
      </div>
    </div>

    <div style="margin-top: 40px;" class="visualizer" id="visualizer"></div>

    <div class="now-playing" style="margin-top: 20px;">
      <span class="np-label" id="npLabel" style="font-size: 18px;">Welcome</span>
      <span class="np-title" id="npTitle">Open browser to begin</span>
    </div>

    <div class="divider"></div>

    <!-- VIEW 1: Open Browser -->
    <div id="viewInitial" class="view">
      <div class="hint">Click <b>Open Browser</b>, sign into Spotify in the window that opens, then come back here to log in.</div>
      <div class="controls" style="margin-top: 30px;">
        <button class="btn btn-primary" onclick="openBrowser()">Open Browser</button>
      </div>
    </div>

    <!-- VIEW 2: Login Form -->
    <div id="viewLogin" class="view hidden">
      <div class="input_group">
        <label>Myspotify Email Address</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="off">
      </div>
      <div class="input_group">
        <label>Myspotify Password</label>
        <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="off">
      </div>
      <div class="error" id="loginError"></div>
      <div class="controls">
        <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">Login</button>
        <button class="btn btn-reset" onclick="resetApp()">Restart</button>
      </div>
    </div>

    <!-- VIEW 3a: Configure (Start) -->
    <div id="viewConfigure" class="view hidden">
      <div class="controls" style="margin-top: 30px;">
        <button class="btn btn-primary" id="btnStart" onclick="start()">Start</button>
        <button class="btn btn-reset" onclick="resetApp()">Logout</button>
      </div>
    </div>

    <!-- VIEW 3b: Running (Play / Pause / Reset) -->
    <div id="viewRunning" class="view hidden" style="margin-top:20px;">
      <div class="controls">
        <button class="btn btn-primary" id="btnPlay" onclick="playAction()" disabled>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
            <polygon points="2,1 9,5 2,9"/>
          </svg>
          Play
        </button>
        <button class="btn btn-pause" id="btnPause" onclick="pauseAction()">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor">
            <rect x="1" y="1" width="2.5" height="7" rx=".5"/>
            <rect x="5.5" y="1" width="2.5" height="7" rx=".5"/>
          </svg>
          Pause
        </button>
        <button class="btn btn-reset" id="btnResetPlaylists" onclick="restartPlayback()">Restart</button>
        <button class="btn btn-reset" onclick="resetApp()">Logout</button>
      </div>
      <div id="interruptBar" class="interrupt-bar hidden"></div>
    </div>

    <div style="position:fixed; bottom:12px; right:18px; font-size:11px; font-family:'DM Mono',monospace; color:#888; letter-spacing:.06em; z-index:999; -webkit-app-region:no-drag;">v1.1.2</div>

  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const statusPill = document.getElementById('statusPill');
    const statusText = document.getElementById('statusText');
    const npLabel    = document.getElementById('npLabel');
    const npTitle    = document.getElementById('npTitle');
    const loginError = document.getElementById('loginError');
    const btnLogin   = document.getElementById('btnLogin');
    const btnPlay    = document.getElementById('btnPlay');
    const btnPause   = document.getElementById('btnPause');
    const btnResetPlaylists = document.getElementById('btnResetPlaylists');
    const viz          = document.getElementById('visualizer');
    const interruptBar = document.getElementById('interruptBar');

    function playAlertBeep() {
      try {
        const ctx = new AudioContext();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.6);
      } catch (e) {}
    }

    function sendNotification(title, body) {
      ipcRenderer.send('show-notification', { title, body });
    }

    function showInterruption(reason, level, notify = true) {
      interruptBar.textContent = (level === 'error' ? '✕ ' : '⚠ ') + reason;
      interruptBar.classList.remove('hidden', 'error');
      if (level === 'error') {
        interruptBar.classList.add('error');
        if (notify) {
          playAlertBeep();
          sendNotification(reason, 'Myspotify Agent — click the app to take action');
        }
      }
    }
    function clearInterruption() {
      interruptBar.textContent = '';
      interruptBar.classList.add('hidden');
      interruptBar.classList.remove('error');
    }

    // Track the currently playing playlist title so Pause/Play can preserve it
    let currentPlaylistTitle = null;

    // ---- Restore saved credentials ----
    const savedEmail    = localStorage.getItem('savedEmail');
    const savedPassword = localStorage.getItem('savedPassword');
    if (savedEmail)    document.getElementById('loginEmail').value    = savedEmail;
    if (savedPassword) document.getElementById('loginPassword').value = savedPassword;

    // ---- Visualizer bars ----
    const heights = [6,8,14,20,28,34,38,34,28,22,16,24,30,36,30,22,18,26,34,38,32,24,16,22,30,36,28,20,14,10,8,6];
    for (let i = 0; i < heights.length; i++) {
      const b = document.createElement('div');
      b.className = 'bar';
      b.style.setProperty('--h', heights[i] + 'px');
      b.style.setProperty('--dur', (0.6 + Math.random() * 0.8).toFixed(2) + 's');
      b.style.animationDelay = (i * 0.03).toFixed(2) + 's';
      viz.appendChild(b);
    }

    // ---- Single source of truth for the header message ----
    function setMessage(label, title, highlightTitle = false) {
      npLabel.textContent = label;
      npTitle.textContent = title || '—';
      npTitle.classList.toggle('active', highlightTitle && !!title);
    }

    function showView(name) {
      ['viewInitial', 'viewLogin', 'viewConfigure', 'viewRunning'].forEach(id =>
        document.getElementById(id).classList.toggle('hidden', id !== name));
    }

    function setStatus(mode, label) {
      statusText.textContent = label;
      document.body.classList.remove('running', 'paused');
      statusPill.classList.remove('active');
      if (mode === 'running') {
        document.body.classList.add('running');
        statusPill.classList.add('active');
      } else if (mode === 'paused') {
        document.body.classList.add('paused');
        statusPill.classList.add('active');
      }
    }

    // ---- Actions ----
    function openBrowser() {
      ipcRenderer.send('open-browser', 'chrome');
      setStatus('idle', 'BROWSER OPENED');
      setMessage('Sign In', 'Enter your credentials below');
      showView('viewLogin');
    }

    async function doLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      loginError.textContent = '';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        loginError.textContent = 'Enter a valid email';
        return;
      }
      if (!password) {
        loginError.textContent = 'Password required';
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Signing in…';
      setMessage('Signing In', 'Please wait…');

      try {
        const result = await ipcRenderer.invoke('login', { email, password });
        if (result.success) {
          localStorage.setItem('savedEmail', email);
          localStorage.setItem('savedPassword', password);
          showView('viewConfigure');
          setStatus('idle', 'READY');
          setMessage('Ready', 'Press Start to begin');
        } else {
          loginError.textContent = result.message || 'Login failed';
          setMessage('Sign In', 'Enter your credentials below');
        }
      } catch (e) {
        loginError.textContent = 'Network error: ' + e.message;
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Login';
      }
    }

    function start() {
      clearInterruption();
      ipcRenderer.send('start', {});
      setStatus('running', 'RUNNING');
      setMessage('Starting', 'Loading your playlists…');
      showView('viewRunning');
      showRestartButton();
      btnPlay.disabled = true;
      btnPause.disabled = false;
    }

    function pauseAction() {
      ipcRenderer.send('pause');
      setStatus('paused', 'PAUSED');
      setMessage('Paused', currentPlaylistTitle || '—', true);
      btnPlay.disabled = false;
      btnPause.disabled = true;
    }

    function playAction() {
      ipcRenderer.send('resume'); // worker handles both cases (see below)
      setStatus('running', 'RUNNING');
      setMessage(
        currentPlaylistTitle ? 'Now Playing' : 'Starting',
        currentPlaylistTitle || 'Loading next playlist…',
        !!currentPlaylistTitle
      );
      btnPlay.disabled = true;
      btnPause.disabled = false;
    }

    // Restart — reopen browser with the same playlist, no API call
    function restartPlayback() {
      btnResetPlaylists.disabled = true;
      setMessage('Restarting', 'Reopening browser…');
      setStatus('idle', 'RESTARTING');
      ipcRenderer.send('restart');
      setTimeout(() => {
        btnResetPlaylists.disabled = false;
        setStatus('running', 'RUNNING');
        setMessage('Starting', 'Loading playlist…');
        btnPlay.disabled = true;
        btnPause.disabled = false;
      }, 1000);
    }

    // Retry — ask the worker to fetch a playlist from the API again
    function retryFetch() {
      btnResetPlaylists.disabled = true;
      setMessage('Retrying', 'Fetching playlist…');
      setStatus('idle', 'RETRYING');
      ipcRenderer.send('retry-fetch');
      setTimeout(() => {
        btnResetPlaylists.disabled = false;
      }, 1000);
    }

    function showRetryButton() {
      btnResetPlaylists.textContent = 'Retry';
      btnResetPlaylists.onclick = retryFetch;
    }

    function showRestartButton() {
      btnResetPlaylists.textContent = 'Restart';
      btnResetPlaylists.onclick = restartPlayback;
    }

    // The existing Logout button — full reset back to the welcome view
    function resetApp() {
      ipcRenderer.send('reset');
      document.getElementById('loginEmail').value = localStorage.getItem('savedEmail') || '';
      document.getElementById('loginPassword').value = localStorage.getItem('savedPassword') || '';
      loginError.textContent = '';
      currentPlaylistTitle = null;
      setStatus('idle', 'IDLE');
      setMessage('Welcome', 'Open browser to begin');
      showView('viewInitial');
    }

    // ---- Updates from worker ----
    ipcRenderer.on('playlist-update', (e, data) => {
      clearInterruption();
      currentPlaylistTitle = data.title || data.url || 'Untitled playlist';
      setMessage('Now Playing', currentPlaylistTitle, true);
      showRestartButton();
    });

    ipcRenderer.on('interruption', (e, data) => {
      if (!data) return;
      if (data.clear) {
        clearInterruption();
        setStatus('running', 'RUNNING');
        setMessage('Now Playing', currentPlaylistTitle || '—', !!currentPlaylistTitle);
        btnPause.disabled = false;
      } else if (data.reason) {
        showInterruption(data.reason, data.level, data.notify !== false);
        if (data.ui) {
          setStatus('paused', data.ui.status || 'INTERRUPTED');
          setMessage(data.ui.label || 'Interrupted', currentPlaylistTitle || data.ui.title || '—', true);
        }
        if (data.level === 'error') {
          btnPause.disabled = true;
          btnPlay.disabled = true;
        }
      }
    });

    ipcRenderer.on('playback-changed', (e, data) => {
      if (data.playing) {
        setStatus('running', 'RUNNING');
        setMessage('Now Playing', currentPlaylistTitle || '—', !!currentPlaylistTitle);
        btnPlay.disabled = true;
        btnPause.disabled = false;
      } else {
        setStatus('paused', 'PAUSED');
        setMessage('Paused', currentPlaylistTitle || '—', true);
        btnPlay.disabled = false;
        btnPause.disabled = true;
      }
    });

    ipcRenderer.on('playback-state', (e, data) => {
      if (data.state === 'no-playlists') {
        currentPlaylistTitle = null;
        setMessage('No Playlists', 'Nothing assigned. Click Retry to fetch again.');
        setStatus('idle', 'IDLE');
        btnPlay.disabled = true;
        btnPause.disabled = true;
        showRetryButton();
      } else if (data.state === 'finished-all') {
        // Only relevant if user is still on the running view
        if (!document.getElementById('viewInitial').classList.contains('hidden')) return;
        currentPlaylistTitle = null;
        setMessage('Completed', 'All playlists played');
        setStatus('idle', 'DONE');
        showView('viewConfigure');
      }
    });
  </script>

</body>
</html>
